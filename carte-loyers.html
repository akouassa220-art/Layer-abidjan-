<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte Loyers – Abidjan</title>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&display=swap');

    :root {
      --bg:      #0f1a0f;
      --surface: #192619;
      --border:  #2a3d2a;
      --accent:  #7cfc5e;
      --text:    #e8f5e4;
      --muted:   #7a9470;
      --font-head: 'Syne', sans-serif;
      --font-body: 'Space Grotesk', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left .eyebrow {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .header-left h1 {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 800;
    }

    .header-left h1 span { color: var(--accent); }

    .stats-bar {
      display: flex;
      gap: 16px;
    }

    .stat {
      text-align: right;
    }

    .stat-value {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Panneau latéral */
    .panel {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      z-index: 5;
      max-height: calc(100% - 32px);
      overflow-y: auto;
    }

    .panel-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .filter-group { margin-bottom: 14px; }

    .filter-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      display: block;
    }

    select.filter-select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .legend {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .legend-title {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 12px;
      color: var(--text);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Popup */
    .maplibregl-popup-content {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      padding: 14px 16px !important;
      color: var(--text) !important;
      font-family: var(--font-body) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
      min-width: 200px;
    }

    .maplibregl-popup-tip { display: none !important; }

    .popup-type {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .popup-loyer {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .popup-loyer span {
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      font-family: var(--font-body);
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .popup-row strong { color: var(--text); }

    /* Liste des enregistrements */
    .records-list {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .record-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .record-item:hover { border-color: var(--accent); }

    .record-commune {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .record-loyer {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
    }

    .record-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .no-data {
      text-align: center;
      padding: 20px 0;
      color: var(--muted);
      font-size: 13px;
    }

    /* Toggle panel on mobile */
    .panel-toggle {
      display: none;
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 6;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      .panel { display: none; width: calc(100% - 32px); }
      .panel.open { display: block; }
      .panel-toggle { display: block; }
      .stats-bar { display: none; }
    }

    .refresh-btn {
      position: absolute;
      bottom: 20px;
      right: 16px;
      z-index: 5;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      padding: 12px 18px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,252,94,0.3);
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="eyebrow">Layer Abidjan · Visualisation</div>
    <h1>Carte des <span>Loyers</span></h1>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-label">Collectes</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statMoy">—</div>
      <div class="stat-label">Moy. FCFA</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="statMax">—</div>
      <div class="stat-label">Max FCFA</div>
    </div>
  </div>
</header>

<div class="map-container">
  <button class="panel-toggle" onclick="togglePanel()">☰ Filtres</button>

  <div class="panel" id="panel">
    <div class="panel-title">Filtres & Données</div>

    <div class="filter-group">
      <span class="filter-label">Type de logement</span>
      <select class="filter-select" id="filterType" onchange="applyFilters()">
        <option value="">Tous les types</option>
        <option>Studio</option>
        <option>F1</option>
        <option>F2</option>
        <option>F3</option>
        <option>F4+</option>
        <option>Villa</option>
        <option>Chambre</option>
      </select>
    </div>

    <div class="legend">
      <div class="legend-title">Loyer mensuel (FCFA)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> &lt; 50 000</div>
      <div class="legend-item"><div class="legend-dot" style="background:#84cc16"></div> 50 000 – 150 000</div>
      <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div> 150 000 – 300 000</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f97316"></div> 300 000 – 500 000</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> &gt; 500 000</div>
    </div>

    <div class="records-list">
      <div class="panel-title" style="margin-top:0">Enregistrements</div>
      <div id="recordsList"><div class="no-data">Chargement...</div></div>
    </div>
  </div>

  <div id="map"></div>

  <button class="refresh-btn" onclick="loadData()">↻ Actualiser</button>
</div>

<script>
  const SUPABASE_URL = 'https://mwilxnzspieofsyxhytk.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_PT-c-kvXjhgbEReGeCZlDg_ZtR-RjXS';

  let map, allData = [], markers = [];

  // Initialiser la carte
  map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        'osm': {
          type: 'raster',
          tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '© OpenStreetMap'
        }
      },
      layers: [{
        id: 'osm',
        type: 'raster',
        source: 'osm',
        paint: {
          'raster-opacity': 0.6,
          'raster-saturation': -0.8,
          'raster-brightness-min': 0.05,
          'raster-brightness-max': 0.4
        }
      }]
    },
    center: [-3.9797, 5.3464], // Centre Abidjan
    zoom: 11
  });

  map.addControl(new maplibregl.NavigationControl(), 'top-right');

  function getLoyerColor(loyer) {
    if (loyer < 50000)  return '#22c55e';
    if (loyer < 150000) return '#84cc16';
    if (loyer < 300000) return '#eab308';
    if (loyer < 500000) return '#f97316';
    return '#ef4444';
  }

  function formatFCFA(n) {
    if (!n) return '—';
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return Math.round(n/1000) + 'k';
    return n.toString();
  }

  function formatFCFAFull(n) {
    return new Intl.NumberFormat('fr-FR').format(n) + ' FCFA';
  }

  async function loadData() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/loyers?select=*&order=date_collecte.desc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      allData = await res.json();
      applyFilters();
      updateStats();
    } catch(e) {
      document.getElementById('recordsList').innerHTML = '<div class="no-data">Erreur de connexion</div>';
    }
  }

  function updateStats() {
    const total = allData.length;
    const loyers = allData.map(d => d.loyer_mensuel).filter(Boolean);
    const moy = loyers.length ? Math.round(loyers.reduce((a,b) => a+b, 0) / loyers.length) : 0;
    const max = loyers.length ? Math.max(...loyers) : 0;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statMoy').textContent = formatFCFA(moy);
    document.getElementById('statMax').textContent = formatFCFA(max);
  }

  function applyFilters() {
    const typeFilter = document.getElementById('filterType').value;

    const filtered = allData.filter(d => {
      if (typeFilter && d.type_logement !== typeFilter) return false;
      return true;
    });

    renderMarkers(filtered);
    renderList(filtered);
  }

  function renderMarkers(data) {
    // Supprimer anciens marqueurs
    markers.forEach(m => m.remove());
    markers = [];

    data.forEach(item => {
      // Extraire coords depuis le champ collecteur ou localisation
      let lat, lng;

      if (item.localisation) {
        // Format: POINT(lng lat)
        const match = item.localisation.match(/POINT\(([^ ]+) ([^ )]+)\)/);
        if (match) {
          lng = parseFloat(match[1]);
          lat = parseFloat(match[2]);
        }
      }

      // Si pas de GPS, placer aléatoirement autour d'Abidjan pour demo
      if (!lat || !lng) {
        lat = 5.3464 + (Math.random() - 0.5) * 0.1;
        lng = -3.9797 + (Math.random() - 0.5) * 0.1;
      }

      const color = getLoyerColor(item.loyer_mensuel);

      const el = document.createElement('div');
      el.style.cssText = `
        width: 14px; height: 14px;
        background: ${color};
        border: 2px solid white;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        transition: transform 0.15s;
      `;
      el.addEventListener('mouseenter', () => el.style.transform = 'scale(1.5)');
      el.addEventListener('mouseleave', () => el.style.transform = 'scale(1)');

      // Extraire infos du champ collecteur
      const parts = (item.collecteur || '').split(' | ');
      const collecteurNom = parts[0] || '—';
      const lieu = parts[1] || '—';

      const popup = new maplibregl.Popup({ offset: 15, closeButton: true })
        .setHTML(`
          <div class="popup-type">${item.type_logement || '—'}</div>
          <div class="popup-loyer">${formatFCFAFull(item.loyer_mensuel)} <span>/ mois</span></div>
          <div class="popup-row"><span>Lieu</span><strong>${lieu}</strong></div>
          <div class="popup-row"><span>Superficie</span><strong>${item.superficie ? item.superficie + ' m²' : '—'}</strong></div>
          <div class="popup-row"><span>Date</span><strong>${item.date_collecte || '—'}</strong></div>
          <div class="popup-row"><span>Collecteur</span><strong>${collecteurNom}</strong></div>
        `);

      const marker = new maplibregl.Marker({ element: el })
        .setLngLat([lng, lat])
        .setPopup(popup)
        .addTo(map);

      markers.push(marker);
    });
  }

  function renderList(data) {
    const list = document.getElementById('recordsList');
    if (!data.length) {
      list.innerHTML = '<div class="no-data">Aucune donnée collectée</div>';
      return;
    }

    list.innerHTML = data.map((item, i) => {
      const parts = (item.collecteur || '').split(' | ');
      const lieu = parts[1] || '—';
      return `
        <div class="record-item" onclick="focusMarker(${i})">
          <div class="record-commune">${lieu}</div>
          <div class="record-loyer">${formatFCFAFull(item.loyer_mensuel)}</div>
          <div class="record-meta">${item.type_logement || '—'} · ${item.superficie ? item.superficie + ' m²' : '?'}</div>
        </div>
      `;
    }).join('');
  }

  function focusMarker(i) {
    if (markers[i]) {
      const lngLat = markers[i].getLngLat();
      map.flyTo({ center: [lngLat.lng, lngLat.lat], zoom: 14, duration: 800 });
      markers[i].togglePopup();
    }
  }

  function togglePanel() {
    document.getElementById('panel').classList.toggle('open');
  }

  // Charger les données au démarrage
  map.on('load', loadData);
</script>
</body>
</html>
